  - id: M4
    name: "Verification / Repair Loop"
    status: in_progress
    owner: Full-stack/QA
    exit_criteria:
      - criterion: "Verification failures produce repair context"
        met: true
        evidence: ["server/src/services/orchestrator/index.ts (buildRepairUserMessage, REPAIR_STAGE_INSTRUCTIONS)", "server/src/services/orchestrator/index.test.ts"]
        note: >
          M4 slice 3 (2026-07-06): a failed check's exact output, the original plan, and every
          file generated so far are assembled into a repair prompt via buildRepairUserMessage()
          and sent to the provider with REPAIR_STAGE_INSTRUCTIONS. Verified by unit test
          (asserts the message contains the plan, file contents, and failure output).
      - criterion: "Repair fixes at least one known import/build error"
        met: false
        evidence: []
        note: >
          Still not met, but substantially narrowed (2026-07-06,
          feature/m4-e2e-verification-proof). This session ran the real Express server against a
          real local Postgres instance and posted a real job through POST /api/generations: PLAN
          ran for real (mock provider), then BUILD's real GitHub branch-creation call failed with
          a genuine `401 Bad credentials` from the real GitHub REST API (server logs:
          "GitHub API error during getBranchSha(...): (status 401): Bad credentials") — the job
          never reached the QA/verification step at all (confirmed: zero qa_runs rows for that
          job). This is now a directly-observed failure from the real running application, not an
          inferred one. Separately, this session proved the verification+repair *mechanics*
          against genuinely real tool execution: a real `npm install` + real `npm run lint` (not
          mocked) against a demo repo with an actual ESLint `no-unused-vars` violation produced a
          real `failed` outcome, persisted to a real qa_runs row in the same live Postgres
          instance; `decideRepairAction()` — called with that real VerificationResult, not a
          hand-built fixture — correctly returned a `repair` decision; after applying a fix (a
          manual edit standing in for a real LLM patch, since no provider key is available), a
          real re-run of npm install/npm run lint genuinely passed, persisted a second real
          qa_runs row, and `decideRepairAction()` correctly returned `proceed`. What remains
          unverified is now precisely two things: (1) BUILD/REPAIR committing files back through
          a real GitHub token, and (2) a real LLM (not the mock provider) producing the fix
          content. See RISK-18 for the exact remediation checklist to close these.

          Still not met (2026-07-06, feature/m4-final-railway-e2e-proof): an attempt was made to
          close the remaining gap by running the proof against Railway, where a real GitHub token
          and provider key are understood to be configured. This attempt found a harder blocker
          than expected: this Claude Code Remote session has **no technical channel to Railway at
          all** — no Railway CLI installed, no RAILWAY_TOKEN/RAILWAY_API_TOKEN environment
          variable, no Railway MCP connector connected to this account (confirmed via
          ListConnectors), no documented deployed URL or project ID anywhere in the repository
          (`.env.example` and `server/src/services/orchestrator/index.ts` only show the URL
          *pattern* `https://<branch>-<project-id>.railway.app`, never a committed value), and no
          GitHub Actions workflow or Deployments-API tool that would surface one. This is a
          categorically different (and more fundamental) blocker than the prior session's
          "GITHUB_TOKEN is a non-functional placeholder" finding — it isn't that the credentials
          in reach are bad, it's that Railway itself is unreachable from this session by any
          available means. See RISK-18 for the updated remediation checklist distinguishing what
          this session's environment needs vs. what a session with real Railway access needs.
      - criterion: "Reviewer can approve/request changes"
        met: needs-audit
        evidence: ["server/src/routes/jobs.ts:81-96 (approve only, no request-changes path found)"]
    notes: >
      Kickoff planning complete (2026-07-05): docs/engineering/M4_VERIFICATION_ENGINE_PLAN.md
      scopes 4 incremental slices. Slice 1 implemented (2026-07-06,
      feature/m4-verification-slice-1): real workspace materialization (reusing the existing
      github.getRepoFiles fetcher — no local git/tarball dependency added), package-script
      detection, and a real `npm run lint` via an injectable, timeout-enforced, shell-free
      execFile wrapper.

      Slice 2 implemented (2026-07-06, feature/m4-verification-slice-2):
      server/src/services/verification/verify.ts now runs all four checks
      (lint/build/typecheck/test), each independently detected/skippable, and persists one
      full qa_runs row per job (no migration needed — confirmed by the plan's schema audit).
      The orchestrator's QA step (server/src/services/orchestrator/index.ts) now gates the
      pipeline: a failed/errored check throws, which the existing createJob().catch() turns
      into status='failed' (reusing the codebase's existing error-propagation convention); a
      skipped check never blocks progression. New GET /api/jobs/:id/qa route
      (server/src/routes/jobs.ts) returns a job's qa_runs history, most recent first.

      Slice 3 implemented (2026-07-06, feature/m4-verification-slice-3): a bounded repair loop.
      decideRepairAction() (pure, exported) decides proceed/repair/fail from a verification
      result and a qa_runs row count: a failed check gets up to 2 repair attempts; an errored
      check is never repaired (fails immediately, same as slice 2); a skipped check never
      blocks. generateAndCommitFiles() is shared by BUILD and REPAIR so a repair attempt reuses
      the exact same provider-call-then-commit flow, with a dedicated REPAIR_STAGE_INSTRUCTIONS
      prompt (plan + files generated so far, merged by path across attempts + exact failing
      output, asking for a minimal fix). No qa_runs migration.

      1 of M4's 3 exit criteria is now met ("verification failures produce repair context");
      "repair fixes at least one known import/build error" remains unmet pending a real
      end-to-end demonstration (see above); "Reviewer can approve/request changes" is unchanged
      (needs-audit). 43 new tests across slices 1-3, all against injected fakes or pure decision
      functions — no live DB/GitHub/provider was used in any session
      (118/118 server tests passing, up from 75 at M3.3).

      Slice 4 implemented (2026-07-06, feature/m4-verification-slice-4): adds an in-memory-only
      durationMs field to CheckResult (server/src/services/verification/checks.ts), measured
      around runCommand/runInstall's exec() calls — null only when a check never actually ran
      (skipped, or an upstream failure like a failed install/workspace materialization); every
      check that actually executed reports a real elapsed value. No qa_runs migration. Also
      resolves the four scope questions slice 3 left open via
      adr/0008-m4-verification-scope-boundaries.md (Accepted): preview-error-triggered repair,
      accessibility smoke checks, and license checks are all deferred (none required by M4's exit
      criteria); structured timing is added now, as above. None of the four ADR-0008 decisions
      change which of M4's 3 exit criteria are met — the milestone remains in_progress on the
      same "repair fixes at least one known import/build error" gap. This session additionally
      ran the qa_runs persistence layer for real against a live local Postgres instance (all 5
      migrations applied, persistQaRun/listQaRuns round-tripped correctly, most-recent-first
      ordering confirmed) — narrowing RISK-18 to specifically the GitHub-API and real-provider
      legs, which remain blocked in this environment (non-functional GITHUB_TOKEN, no provider
      API key). 119/119 server tests passing, up from 118.

      Real E2E verification attempt (2026-07-06, feature/m4-e2e-verification-proof): the real
      Express server was started against a real local Postgres instance and driven through its
      actual HTTP API. A real job posted to POST /api/generations ran PLAN for real, then failed
      at BUILD's real GitHub branch-creation call with a genuine 401 Bad credentials from the
      real GitHub REST API — captured directly from server logs and the job's persisted
      error_message, not inferred. The job never reached QA (zero qa_runs rows). Separately, a
      real npm install + real npm run lint against a demo repo with a genuine ESLint violation
      exercised runVerification()/decideRepairAction() for real: a real failure was detected and
      persisted, decideRepairAction() (fed the real result) correctly chose to repair, a real
      fix made the real re-run pass, and decideRepairAction() then correctly chose to proceed —
      all against the same live Postgres instance, confirmed independently via direct SQL query.
      M4's 3 exit criteria remain unchanged (1 of 3 met) — the repair loop's mechanics are now
      proven against genuine tool execution and genuine persistence, not just unit-test fakes,
      but a full HTTP-API-triggered job reaching `review` still requires a working GitHub PAT
      and a real provider API key, neither available in this environment. See RISK-18 for the
      remediation checklist.

      Railway E2E attempt (2026-07-06, feature/m4-final-railway-e2e-proof): attempted to close
      the remaining gap using Railway, where a real GitHub token and provider key are understood
      to be configured. Found a harder blocker: this session has no technical channel to Railway
      at all (no CLI, no API token, no MCP connector, no documented deployment URL — see RISK-18
      for the full list of checks performed). M4 remains in_progress; exit criteria unchanged.
      This is not a regression — it precisely identifies what's needed next (Railway access from
      wherever the E2E proof is run) rather than leaving the gap vague.

