  - id: RISK-16
    title: "Verification engine must not fabricate pass/fail for checks a target repo doesn't define"
    source: "docs/engineering/M4_VERIFICATION_ENGINE_PLAN.md"
    probability: low
    impact: high
    mitigation: >
      Resolved by M4 slice 1: server/src/services/verification/checks.ts's
      detectAvailableChecks() reads the target repo's own package.json scripts and reports a
      missing script as unavailable; server/src/services/verification/verify.ts persists
      lintPassed: null (not true/false) when lint is skipped, mirroring
      WebContainersPreview.jsx's existing dev/start script detection pattern.
    status: mitigated
    repo_evidence: >
      server/src/services/verification/checks.test.ts covers detectAvailableChecks returning
      all-false for missing/unparsable package.json and exactly the present scripts otherwise;
      server/src/services/verification/verify.test.ts confirms a skipped lint persists
      `lintPassed: null`, not a fabricated true. Blair operates on arbitrary connected
      repositories chosen via the repo/branch picker (README.md:12-21), not just this monorepo,
      so a hardcoded `npm run typecheck` would either fail on repos without that script or
      silently report false confidence if a
      missing script were ever treated as an implicit pass.

