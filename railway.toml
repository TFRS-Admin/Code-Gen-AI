# Railway deployment config — FRONTEND service (Vite/React).
# Root directory for this service: repo root ("/").
# Backend (Express/Node) config lives in server/railway.toml — set that
# service's root directory to "/server" in the Railway dashboard.
#
# Build produces static assets in dist/; Caddy serves them at runtime
# (see ./Caddyfile). Node/devDependencies (vite, etc.) are only needed
# at build time — see nixpacks.toml for how they're installed.

[build]
builder = "nixpacks"

[deploy]
startCommand = "caddy run --config Caddyfile --adapter caddyfile"
healthcheckPath = "/"
healthcheckTimeout = 30
