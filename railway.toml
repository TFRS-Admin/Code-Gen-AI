# Railway deployment config for Code-Gen-AI (Blair Platform)
# Frontend (Vite/React) lives at repo root.
# Backend (Express/Node) lives in /server.
# Railway: add two services pointing to this repo — one for root, one for /server.

[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run preview -- --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
