# Railway deployment config — BACKEND service (Express/Node).
# Root directory for this service: "/server" (set in the Railway dashboard).
# Node version and build/start commands for this service also come from
# server/nixpacks.toml.

[build]
builder = "nixpacks"

[deploy]
# Migrations are idempotent (CREATE TABLE IF NOT EXISTS / ADD COLUMN IF NOT
# EXISTS), so running them on every deploy is safe. Without this, a fresh or
# reset DATABASE_URL has no `jobs` table and every /api/jobs request 500s
# with "relation \"jobs\" does not exist" until someone runs `npm run migrate`
# by hand.
startCommand = "npm run migrate && npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
